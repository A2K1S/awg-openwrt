name: Create Release on Tag

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'ImmortalWrt version (e.g., 24.10.5)'
        required: true
        type: string
      targets:
        description: 'Targets (comma-separated, optional)'
        required: false
        type: string
      subtargets:
        description: 'Subtargets (comma-separated, optional)'
        required: false
        type: string

jobs:
  generate-config:
    runs-on: ubuntu-latest
    outputs:
      job-config: ${{ steps.generate-config.outputs.job-config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'

      - name: Get Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
            echo "TARGETS=${{ inputs.targets }}" >> $GITHUB_ENV
            echo "SUBTARGETS=${{ inputs.subtargets }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm install

      - name: Generate Job Config
        id: generate-config
        run: node index.js ${{ env.VERSION }} "${{ env.TARGETS }}" "${{ env.SUBTARGETS }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: "v${{ matrix.build_env.tag }} - ${{ matrix.build_env.pkgarch}} :: ${{ matrix.build_env.target}}/${{ matrix.build_env.subtarget}}"
    runs-on: ubuntu-latest
    needs: generate-config
    strategy:
      matrix:
        build_env: ${{ fromJson(needs.generate-config.outputs.job-config) }}
      fail-fast: false

    steps:
      - name: Checkout AWG source code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: immortalwrt-sdk-*/
          key: ${{ runner.os }}-sdk-${{ matrix.build_env.tag }}-${{ matrix.build_env.target}}-${{ matrix.build_env.subtarget}}

      - name: Download and extract ImmortalWrt SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          # Исправленная ссылка: добавлен /releases/ и корректная переменная ${{ ... }}
          BASE_URL="https://downloads.immortalwrt.org{{ matrix.build_env.tag }}/targets/${{ matrix.build_env.target }}/${{ matrix.build_env.subtarget }}/"
          
          # Поиск файла SDK
          SDK_FILE=$(curl -s "$BASE_URL" | grep -oE "immortalwrt-sdk-[a-zA-Z0-9._-]+\.Linux-x86_64\.tar\.(xz|zst)" | head -n1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "SDK file not found at $BASE_URL"
            exit 1
          fi
          
          echo "Found SDK: $SDK_FILE"
          wget "${BASE_URL}${SDK_FILE}"
          
          if [[ "$SDK_FILE" == *.tar.zst ]]; then
            tar --zstd -xf "$SDK_FILE"
          else
            tar -xf "$SDK_FILE"
          fi
          rm "$SDK_FILE"

      - name: Setup SDK and feeds
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "immortalwrt-sdk-*" -type d | head -n1)
          WORKSPACE_DIR=$(pwd)
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -r "$WORKSPACE_DIR/kmod-amneziawg" package/
          cp -r "$WORKSPACE_DIR/amneziawg-tools" package/
          cp -r "$WORKSPACE_DIR/luci-proto-amneziawg" package/
          echo "CONFIG_PACKAGE_kmod-amneziawg=m" > .config
          echo "CONFIG_PACKAGE_amneziawg-tools=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-amneziawg=y" >> .config
          make defconfig

      - name: Build AmneziaWG packages
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "immortalwrt-sdk-*" -type d | head -n1)
          cd "$SDK_DIR"
          make package/kmod-amneziawg/compile V=s || true
          make package/luci-proto-amneziawg/compile V=s
          make package/amneziawg-tools/compile V=s

      - name: Prepare artifacts
        run: |
          SDK_DIR=$(find . -maxdepth 1 -name "immortalwrt-sdk-*" -type d | head -n1)
          mkdir -p awgrelease
          postfix="v${{ matrix.build_env.tag }}_${{ matrix.build_env.pkgarch}}_${{ matrix.build_env.target}}_${{ matrix.build_env.subtarget}}"
          find "$SDK_DIR/bin/packages" -name "amneziawg-tools_*.ipk" -exec cp {} awgrelease/amneziawg-tools_${postfix}.ipk \;
          find "$SDK_DIR/bin/packages" -name "luci-proto-amneziawg_*.ipk" -exec cp {} awgrelease/luci-proto-amneziawg_${postfix}.ipk \;
          find "$SDK_DIR/bin/targets" -name "kmod-amneziawg_*.ipk" -exec cp {} awgrelease/kmod-amneziawg_${postfix}.ipk \;

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: awgrelease/*.ipk
          tag_name: v${{ matrix.build_env.tag }}
